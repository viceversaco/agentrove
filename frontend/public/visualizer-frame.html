<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visualizer Frame</title>
  </head>
  <body>
    <script>
      const VISUALIZER_INIT_EVENT = 'visualizer-html';

      function renderVisualization(html) {
        const parsed = new DOMParser().parseFromString(html, 'text/html');
        const rootStyle = parsed.documentElement.getAttribute('style');
        const rootClass = parsed.documentElement.getAttribute('class');
        const bodyAttributes = Array.from(parsed.body.attributes).map((attribute) => ({
          name: attribute.name,
          value: attribute.value,
        }));
        const scripts = Array.from(parsed.querySelectorAll('script')).map((script) => ({
          parentTag: parsed.head.contains(script) ? 'head' : 'body',
          attributes: Array.from(script.attributes).map((attribute) => ({
            name: attribute.name,
            value: attribute.value,
          })),
          textContent: script.textContent,
        }));

        if (rootStyle) {
          document.documentElement.setAttribute('style', rootStyle);
        } else {
          document.documentElement.removeAttribute('style');
        }
        if (rootClass) {
          document.documentElement.setAttribute('class', rootClass);
        } else {
          document.documentElement.removeAttribute('class');
        }

        document.head.innerHTML = parsed.head.innerHTML;
        Array.from(document.body.attributes).forEach((attribute) => {
          document.body.removeAttribute(attribute.name);
        });
        bodyAttributes.forEach((attribute) => {
          document.body.setAttribute(attribute.name, attribute.value);
        });
        document.body.innerHTML = parsed.body.innerHTML;
        document.querySelectorAll('script').forEach((script) => script.remove());

        (async () => {
          for (const script of scripts) {
            await new Promise((resolve) => {
              const nextScript = document.createElement('script');
              const target = script.parentTag === 'head' ? document.head : document.body;

              script.attributes.forEach((attribute) => {
                nextScript.setAttribute(attribute.name, attribute.value);
              });

              if (nextScript.src) {
                nextScript.async = false;
                nextScript.onload = () => resolve();
                nextScript.onerror = () => resolve();
              } else {
                nextScript.textContent = script.textContent;
              }

              target.appendChild(nextScript);

              if (!nextScript.src) {
                resolve();
              }
            });
          }

          document.dispatchEvent(new Event('DOMContentLoaded', { bubbles: true }));
          window.dispatchEvent(new Event('load'));
        })();
      }

      window.addEventListener('message', (event) => {
        if (event.data?.type !== VISUALIZER_INIT_EVENT || typeof event.data.html !== 'string') {
          return;
        }

        renderVisualization(event.data.html);
      });
    </script>
  </body>
</html>
