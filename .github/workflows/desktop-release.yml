name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Desktop Bundles (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd frontend/src-tauri
          jq --arg v "$VERSION" '.version = $v' tauri.conf.json > tmp.json && mv tmp.json tauri.conf.json
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml

      - name: Build Tauri bundles
        run: |
          cd frontend
          npm run desktop:build

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          if-no-files-found: error
          path: |
            frontend/src-tauri/target/release/bundle/**/*.dmg
            frontend/src-tauri/target/release/bundle/**/*.app.tar.gz
            frontend/src-tauri/target/release/bundle/**/*.app.tar.gz.sig

  publish:
    name: Publish Desktop Release
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: desktop-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Claudex Desktop ${{ github.ref_name }}
          body: Desktop release for ${{ github.ref_name }}.
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            desktop-artifacts/**/*
